name: Build WASM Assets

on:
  workflow_dispatch:
    inputs:
      wanix_version:
        description: 'Wanix Docker image tag'
        required: false
        default: 'latest'
  push:
    paths:
      - 'wasm/boot/**'
      - 'wasm/system/**'
      - 'Dockerfile.wasm'

env:
  GO_VERSION: '1.25.0'
  TINYGO_VERSION: '0.36.0'
  ALPINE_VERSION: '3.22'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build boot.wasm
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/wasm/boot:/build \
            -w /build \
            golang:${{ env.GO_VERSION }}-alpine \
            sh -c "go mod download && GOOS=js GOARCH=wasm go build -o boot.wasm ."

      - name: Build sys.tar.gz (rootfs + kernel + v86)
        run: docker build -f Dockerfile.wasm -t wasm-assets .

      - name: Extract assets from Docker image
        run: |
          mkdir -p assets/wasm
          docker create --name wasm-extract wasm-assets
          docker cp wasm-extract:/bundles/sys.tar.gz assets/wasm/sys.tar.gz
          docker cp wasm-extract:/bundles/goroot.tar.br assets/wasm/goroot.tar.br || true
          docker cp wasm-extract:/bundles/gocache-386.tar.br assets/wasm/gocache-386.tar.br || true
          docker rm wasm-extract

      - name: Copy boot.wasm to assets
        run: cp wasm/boot/boot.wasm assets/wasm/boot.wasm

      - name: Pull wanix.min.js
        run: |
          docker pull --platform linux/amd64 ghcr.io/tractordev/wanix:runtime
          docker create --name wanix-extract --platform linux/amd64 ghcr.io/tractordev/wanix:runtime
          docker cp wanix-extract:/wanix.min.js assets/wasm/wanix.min.js
          docker cp wanix-extract:/wanix.js assets/wasm/wanix.js || true
          docker rm wanix-extract

      - name: Upload assets as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-assets
          path: assets/wasm/
          retention-days: 30

      - name: Commit assets to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p public/assets/wasm
          cp assets/wasm/* public/assets/wasm/
          git add public/assets/wasm/
          git diff --cached --quiet || git commit -m "chore: update WASM assets [skip ci]"
          git push
